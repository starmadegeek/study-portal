, 0, 0); line-height: 1.2; pointer-events: all; white-space: normal; overflow-wrap: normal;"><div><b>Prompt</b></div><div><b><br /></b></div><div>Passage: <b>"</b><span style="background-color: initial;">William Shakespeare was an English playwright, poet, and actor. He is widely regarded as the greatest writer in the English language and the world's greatest dramatist."</span></div><div><span style="background-color: initial;"> </span></div><div><span style="background-color: initial;">Question: "What is William Shakespeare widely regarded as?"</span></div></div></div></div></foreignObject><text x="11" y="84" fill="rgb(0, 0, 0)" font-family="&quot;Helvetica&quot;" font-size="12px">Prompt...</text></switch></g></g></g><g data-cell-id="UUeiZcvF24W9ggQ7Gpfz-4"><g><rect x="532" y="8" width="286" height="160" fill="none" stroke="none" pointer-events="all"/></g><g><g transform="translate(-0.5 -0.5)scale(2)"><switch><foreignObject pointer-events="none" width="100%" height="100%" requiredFeatures="http://www.w3.org/TR/SVG11/feature#Extensibility" style="overflow: visible; text-align: left;"><div xmlns="http://www.w3.org/1999/xhtml" style="display: flex; align-items: unsafe center; justify-content: unsafe flex-start; width: 141px; height: 1px; padding-top: 44px; margin-left: 268px;"><div data-drawio-colors="color: rgb(0, 0, 0); " style="box-sizing: border-box; font-size: 0px; text-align: left;"><div style="display: inline-block; font-size: 12px; font-family: Helvetica; color: rgb(0, 0, 0); line-height: 1.2; pointer-events: all; white-space: normal; overflow-wrap: normal;"><b>Answer</b><div><b><br /></b><div><span style="background-color: initial;">The greatest writer in the English language and the world's greatest dramatist.</span></div></div></div></div></div></foreignObject><text x="268" y="48" fill="rgb(0, 0, 0)" font-family="&quot;Helvetica&quot;" font-size="12px">Answer...</text></switch></g></g></g><g data-cell-id="UUeiZcvF24W9ggQ7Gpfz-5"><g><path d="M 0 54 L 820 54"